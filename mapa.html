        <script>H5PIntegration = {"ajax":{"setFinished":"","contentUserData":""},"ajaxPath":"/h5p/ajax?action=","contents":{"cid-3580246723":{"displayOptions":{"copy":false,"copyright":true,"embed":false,"export":false,"frame":true,"icon":false},"fullScreen":"1","jsonContent":"{\"iconType\":\"icon\",\"icon\":\"info\",\"color\":\"#0070a8\",\"hotspots\":[{\"position\":{\"x\":41.87643020594965,\"y\":75.45568578362074},\"alwaysFullscreen\":false,\"content\":[{\"params\":{\"text\":\"<p>Los docentes andaluces que imparten clase en centros públicos pueden usar <a href=\\\"https://www.juntadeandalucia.es/educacion/eaprendizaje/servicios-educativos-digitales-2/microsoft365/\\\" rel=\\\"noopener\\\" target=\\\"_blank\\\">Microsoft 365 con Copilot</a> y <a href=\\\"https://blogsaverroes.juntadeandalucia.es/hojaderuta/2024/11/12/gemini-ia-seneca/\\\" target=\\\"_blank\\\">Gemini</a> en sus cuentas corporativas <strong>@m.educaand.es</strong> y <strong>@g.educaand.es</strong>, garantizando que sus datos no se usan para perfilado publicitario.</p>\\n\"},\"library\":\"H5P.Text 1.1\",\"metadata\":{\"contentType\":\"Texto\",\"license\":\"U\",\"title\":\"Sin título Texto\",\"authors\":[],\"changes\":[]},\"subContentId\":\"9f97e722-7d01-40bb-8613-5d459ba4732e\"}],\"header\":\"Andalucía\"},{\"position\":{\"x\":61.327231121281464,\"y\":31.446626560297602},\"alwaysFullscreen\":false,\"content\":[{\"params\":{\"text\":\"<p>El profesorado aragonés dispone de cuentas institucionales seguras para acceder a <strong>Microsoft 365</strong> bajo el dominio oficial de la comunidad (<strong>@educa.aragon.es</strong>), gestionado desde el portal <a href=\\\"https://educa.aragon.es/-/correo-electr%C3%B3nico\\\" rel=\\\"noopener\\\" target=\\\"_blank\\\">Educaragón</a>. Además, pueden acceder a itinerarios formativos sobre la aplicación ética de la IA a través de la plataforma oficial Aularagón, y los docentes de FP cuentan con un <a href=\\\"https://www.datacentermarket.es/inteligencia-artificial/gobierno-de-aragon-impulsara-la-ia-en-la-formacion-profesional/\\\" rel=\\\"noopener\\\" target=\\\"_blank\\\">acuerdo oficial con Microsoft y Founderz</a> para integrar la IA en las aulas mediante formación específica que garantiza su uso responsable y crítico.</p>\\n\"},\"library\":\"H5P.Text 1.1\",\"metadata\":{\"contentType\":\"Texto\",\"license\":\"U\",\"title\":\"Sin título Texto\",\"authors\":[],\"changes\":[]},\"subContentId\":\"dadd17f4-05cf-48f8-a9fc-4bc4dd33c157\"}],\"header\":\"Aragón\"},{\"position\":{\"x\":6.064073226544623,\"y\":85.42000107946748},\"alwaysFullscreen\":false,\"content\":[{\"params\":{\"text\":\"<p>El personal docente accede al ecosistema seguro de Google Workspace for Education (<strong>Gemini</strong>) utilizando obligatoriamente su cuenta de correo corporativa con el dominio <strong>@canariaseducacion.es</strong>. Todo el acceso a estos servicios y a los recursos normativos sobre el uso ético de la inteligencia artificial en el aula se centraliza en el portal oficial de la Consejería, <a href=\\\"https://www3.gobiernodecanarias.org/medusa/ecoescuela/ia/\\\" rel=\\\"noopener\\\" target=\\\"_blank\\\">Ecoescuela</a>.</p>\\n\"},\"library\":\"H5P.Text 1.1\",\"metadata\":{\"contentType\":\"Texto\",\"license\":\"U\",\"title\":\"Sin título Texto\",\"authors\":[],\"changes\":[]},\"subContentId\":\"49fd5246-18be-48d1-a969-159d46688bbd\"}],\"header\":\"Canarias\"},{\"position\":{\"x\":47.94050343249428,\"y\":13.493343629792474},\"alwaysFullscreen\":false,\"content\":[{\"params\":{\"text\":\"<p>Cantabria no dispone actualmente de una herramienta corporativa de IA específica. Sin embargo, a través del contrato de licenciamiento con Microsoft, el profesorado tiene acceso a una versión básica de <strong>Copilot </strong>integrada en el ecosistema de Office 365. Este acceso se realiza de forma oficial mediante las cuentas institucionales con dominio <strong>@educantabria</strong>.es, la cual se integra con la plataforma regional Yedra para mejorar la seguridad de los datos y fomentar la innovación en el aula.</p>\\n\"},\"library\":\"H5P.Text 1.1\",\"metadata\":{\"contentType\":\"Texto\",\"license\":\"U\",\"title\":\"Sin título Texto\",\"authors\":[],\"changes\":[]},\"subContentId\":\"440f15e5-c368-49ae-be37-1e1609f04511\"}],\"header\":\"Cantabria\"},{\"position\":{\"x\":46.338672768878716,\"y\":50.96007734799749},\"alwaysFullscreen\":false,\"content\":[{\"params\":{\"text\":\"<p>En Castilla-La Mancha, el profesorado dispone de acceso a Microsoft Copilot a través de sus cuentas corporativas (<strong>@educastillalamancha.es</strong>) dentro del ecosistema <strong>Office 365</strong>.</p>\\n\\n<p>La principal ventaja del acceso institucional es la Protección de Datos Comerciales: las consultas y datos generados no se utilizan para entrenar modelos de IA, garantizando la confidencialidad y la propiedad intelectual. Además, Microsoft no tiene acceso a los chats de los usuarios, lo que asegura la privacidad del entorno educativo y del alumnado.</p>\\n\"},\"library\":\"H5P.Text 1.1\",\"metadata\":{\"contentType\":\"Texto\",\"license\":\"U\",\"title\":\"Sin título Texto\",\"authors\":[],\"changes\":[]},\"subContentId\":\"1b25b27e-3c5b-46cb-b5e0-05d39779b673\"}],\"header\":\"Castilla-La Mancha\"},{\"position\":{\"x\":39.473684210526315,\"y\":28.955547736335912},\"alwaysFullscreen\":false,\"content\":[{\"params\":{\"text\":\"<p>Todo el profesorado de centros públicos dispone de la suite colaborativa <a href=\\\"https://www.educa.jcyl.es/es/office365-educacyl\\\" rel=\\\"noopener\\\" target=\\\"_blank\\\">Microsoft Office 365 integrada en el portal Educacyl</a> con sus cuentas <strong>@educa.jcyl.es</strong>.</p>\\n\"},\"library\":\"H5P.Text 1.1\",\"metadata\":{\"contentType\":\"Texto\",\"license\":\"U\",\"title\":\"Sin título Texto\",\"authors\":[],\"changes\":[]},\"subContentId\":\"f7891a02-c3fd-4d9e-b3cd-94f14482491b\"}],\"header\":\"Castilla y León\"},{\"position\":{\"x\":72.76887871853546,\"y\":28.125188128348682},\"alwaysFullscreen\":false,\"content\":[{\"params\":{\"text\":\"<p>Las cuentas @xtec.cat integran herramientas como Google Gemini (Education Plus) y Canva for Education. Toda la gestión pedagógica, los recursos para la creación de situaciones de aprendizaje y los itinerarios formativos se centralizan en el portal <a href=\\\"https://projectes.xtec.cat/ia/\\\" rel=\\\"noopener\\\" target=\\\"_blank\\\">IA en educació</a>, donde se establecen las directrices éticas clave, como el límite de 14 años para el uso directo por parte del alumnado y la necesidad de anonimizar siempre los datos personales.</p>\\n\"},\"library\":\"H5P.Text 1.1\",\"metadata\":{\"contentType\":\"Texto\",\"license\":\"U\",\"title\":\"Sin título Texto\",\"authors\":[],\"changes\":[]},\"subContentId\":\"ae735a64-0eb7-4a5a-806d-6b9c443c8d41\"}],\"header\":\"Cataluña\"},{\"position\":{\"x\":50.11441647597255,\"y\":39.127452934179466},\"alwaysFullscreen\":false,\"content\":[{\"params\":{\"text\":\"<p>El profesorado de todos los colegios públicos madrileños puede utilizar tanto las <a href=\\\"https://www.comunidad.madrid/noticias/2025/06/27/diaz-ayuso-renueva-convenio-google-todos-colegios-publicos-madrilenos-utilicen-herramientas-educativas-basadas-ia\\\" rel=\\\"noopener\\\" target=\\\"_blank\\\">herramientas educativas basadas en la IA de Google</a> como los servicios de productividad de <a href=\\\"https://www.comunidad.madrid/noticias/2025/05/23/comunidad-madrid-renueva-su-alianza-microsoft-reforzar-competencia-digital-centros-educativos-herramientas-office-365\\\" rel=\\\"noopener\\\" target=\\\"_blank\\\">Microsoft Office 365</a> para asegurar la competencia digital y las prácticas educativas eficientes con su cuenta de <strong>@educa.madrid.org</strong>.</p>\\n\"},\"library\":\"H5P.Text 1.1\",\"metadata\":{\"contentType\":\"Texto\",\"license\":\"U\",\"title\":\"Sin título Texto\",\"authors\":[],\"changes\":[]},\"subContentId\":\"1836feb0-57fe-4ec8-8267-051e85762282\"}],\"header\":\"Comunidad de Madrid\"},{\"position\":{\"x\":60.64073226544623,\"y\":22.105080970441275},\"alwaysFullscreen\":false,\"content\":[{\"params\":{\"text\":\"<p>Navarra no dispone actualmente de un acuerdo corporativo formalizado ni de un despliegue institucional de herramientas de IA generativa. La Consejería se encuentra en una fase de estudio y valoración, realizando análisis técnicos y jurídicos sobre protección de datos antes de definir una relación cerrada de plataformas.</p>\\n\\n<p>Por el momento, sus actuaciones se centran en iniciativas de acompañamiento y reflexión sobre el uso pedagógico de la IA, pero sin ofrecer herramientas específicas de carácter general para los centros educativos debido a la constante evolución tecnológica y normativa del sector.</p>\\n\\n<p>Las cuentas <strong>@educacion.navarra.es</strong> son cuentas de Google Workspace for Education.</p>\\n\"},\"library\":\"H5P.Text 1.1\",\"metadata\":{\"contentType\":\"Texto\",\"license\":\"U\",\"title\":\"Sin título Texto\",\"authors\":[],\"changes\":[]},\"subContentId\":\"ffb2d05d-a506-41e8-9bef-1a65d91a5231\"}],\"header\":\"Comunidad Foral de Navarra\"},{\"position\":{\"x\":66.47597254004577,\"y\":51.37525715199109},\"alwaysFullscreen\":false,\"content\":[{\"params\":{\"text\":\"<p>Los docentes valencianos trabajan sobre infraestructuras seguras proporcionadas por Microsoft, utilizando sus cuentas corporativas bajo el dominio oficial<a href=\\\"https://sway.cloud.microsoft/AAxkLroo2YyRFWe5?ref=Link&amp;loc=play\\\" target=\\\"_blank\\\"> <strong>@edu.gva.es</strong></a>. Con el fin de garantizar una adopción adecuada en el aula, disponen de un <a href=\\\"https://comunica.gva.es/es/detalle?id=399095334&amp;site=373430869\\\" rel=\\\"noopener\\\" target=\\\"_blank\\\">protocolo de formación suscrito con Microsoft y Founderz</a> orientado a la alfabetización de la comunidad educativa en inteligencia artificial con un enfoque ético y respetuoso con la privacidad.</p>\\n\"},\"library\":\"H5P.Text 1.1\",\"metadata\":{\"contentType\":\"Texto\",\"license\":\"U\",\"title\":\"Sin título Texto\",\"authors\":[],\"changes\":[]},\"subContentId\":\"af98dccf-de9a-45cb-92f2-93b14f3724ff\"}],\"header\":\"Comunitat Valenciana\"},{\"position\":{\"x\":33.86727688787185,\"y\":55.11187538793363},\"alwaysFullscreen\":false,\"content\":[{\"params\":{\"text\":\"<p>En Extremadura, los docentes pueden usar Google Gemini con su cuenta @educarex.es, encontrando toda la información, guías de uso y recursos formativos en el portal <a href=\\\"https://emtic.educarex.es/\\\" target=\\\"_blank\\\"></a><a href=\\\"https://emtic.educarex.es/\\\" rel=\\\"noopener\\\" target=\\\"_blank\\\">emtic</a> de Educarex.</p>\\n\"},\"library\":\"H5P.Text 1.1\",\"metadata\":{\"contentType\":\"Texto\",\"license\":\"U\",\"title\":\"Sin título Texto\",\"authors\":[],\"changes\":[]},\"subContentId\":\"5dda1ba0-ff3e-4cb4-81ac-c96a4c364a6f\"}],\"header\":\"Extremadura\"},{\"position\":{\"x\":26.54462242562929,\"y\":15.877383910537057},\"alwaysFullscreen\":false,\"content\":[{\"params\":{\"text\":\"<p>En Galicia, los docentes pueden utilizar Microsoft Copilot con protección de datos empresarial a través de su cuenta @edu.xunta.gal, disponiendo de directrices pedagógicas en el espacio del Centro de Innovación Educativa y Digital (CIED) y de recursos específicos como la <a href=\\\"https://recursos.edu.xunta.gal/sites/default/files/ficheiros/recursos/IA_Gu%C3%ADa%20del%20profesorado%20%28versi%C3%B3n%20PDF%29.pdf\\\" rel=\\\"noopener\\\" target=\\\"_blank\\\">Guía del profesorado sobre IA</a>.</p>\\n\"},\"library\":\"H5P.Text 1.1\",\"metadata\":{\"contentType\":\"Texto\",\"license\":\"U\",\"title\":\"Sin título Texto\",\"authors\":[],\"changes\":[]},\"subContentId\":\"b4179b0b-1b60-4bb5-8288-63c0c190d52e\"}],\"header\":\"Galicia\"},{\"position\":{\"x\":78.03203661327231,\"y\":59.47126332986659},\"alwaysFullscreen\":false,\"content\":[{\"params\":{\"text\":\"<p>En las Illes Balears, el profesorado puede utilizar Google Gemini con protección de datos empresarial a través de su cuenta corporativa @educaib.eu, centralizándose las directrices, herramientas y recursos de apoyo en el portal <a href=\\\"https://ibsteam.caib.es/utilitats/\\\" rel=\\\"noopener\\\" target=\\\"_blank\\\">IBSTEAM</a> de la Conselleria d'Educació i Universitats y en la oferta formativa del CFINFP-IB.</p>\\n\"},\"library\":\"H5P.Text 1.1\",\"metadata\":{\"contentType\":\"Texto\",\"license\":\"U\",\"title\":\"Sin título Texto\",\"authors\":[],\"changes\":[]},\"subContentId\":\"fb5bdab1-eec0-4951-aea6-2984c702ea6c\"}],\"header\":\"Illes Balears\"},{\"position\":{\"x\":53.775743707093824,\"y\":19.71779709747799},\"alwaysFullscreen\":false,\"content\":[{\"params\":{\"text\":\"<p>La Rioja utiliza la plataforma de IA de Microsoft  accesible para docentes y alumnado mediante sus cuentas corporativas @larioja.edu.es,. Esta implementación se ha formalizado este año a través de una licitación pública, garantizando que el uso de la herramienta cuente con la protección de datos específica para entornos educativos.</p>\\n\\n<p>Además del despliegue técnico, la administración está impulsando acciones formativas para el profesorado. El objetivo es facilitar la integración de la IA en el aula y asegurar que su aprovechamiento pedagógico sea tanto seguro como adecuado.</p>\\n\"},\"library\":\"H5P.Text 1.1\",\"metadata\":{\"contentType\":\"Texto\",\"license\":\"U\",\"title\":\"Sin título Texto\",\"authors\":[],\"changes\":[]},\"subContentId\":\"7c860636-c2cf-42d5-a6f4-ad6d845ebb5b\"}],\"header\":\"La Rioja\"},{\"position\":{\"x\":53.661327231121284,\"y\":11.725585870600911},\"alwaysFullscreen\":false,\"content\":[{\"params\":{\"text\":\"<p>En el País Vasco (Euskadi), el profesorado puede utilizar herramientas como Google Gemini y soluciones locales específicas para el euskera a través de su cuenta corporativa @hezkuntza.eus, disponiendo de orientaciones detalladas en la <a href=\\\"https://www.euskadi.eus/contenidos/documentacion/inn_doc_adi_artif/es_def/adjuntos/Guia-uso-de-IA-en-educacion_Euskadi.pdf\\\" rel=\\\"noopener\\\" target=\\\"_blank\\\">Guía para el uso de las inteligencias artificiales en el ámbito educativo</a> publicada por el Departamento de Educación y Elhuyar.</p>\\n\"},\"library\":\"H5P.Text 1.1\",\"metadata\":{\"contentType\":\"Texto\",\"license\":\"U\",\"title\":\"Sin título Texto\",\"authors\":[],\"changes\":[]},\"subContentId\":\"1420cc33-f69c-455d-8307-f8d328b237c2\"}],\"header\":\"País Vasco\"},{\"position\":{\"x\":34.66819221967963,\"y\":9.442096948636031},\"alwaysFullscreen\":false,\"content\":[{\"params\":{\"text\":\"<p>La Consejería de Educación de Asturias integra Microsoft Copilot en su ecosistema de <a href=\\\"https://www.educastur.es/servicios-ayuda-office-365\\\" target=\\\"_blank\\\">Office 365</a> para docentes con cuenta institucional (<strong>@educastur</strong>). Destaca su Protección de Datos Empresarial (EDP), que garantiza el cumplimiento del RGPD: los datos no son accesibles para Microsoft ni se utilizan para entrenar modelos de IA. También se puede utilizar las herramientas de IA de <strong>Canva Edu</strong>.</p>\\n\\n<p>Actualmente, la región se encuentra en una fase de adopción progresiva, supeditada a las actualizaciones técnicas del proveedor y sin un plan estratégico cerrado. El soporte y los recursos formativos se centralizan a través del <strong>portal Educastur</strong>.</p>\\n\"},\"library\":\"H5P.Text 1.1\",\"metadata\":{\"contentType\":\"Texto\",\"license\":\"U\",\"title\":\"Sin título Texto\",\"authors\":[],\"changes\":[]},\"subContentId\":\"a662cb21-8b88-45d9-b903-100f6102063b\"}],\"header\":\"Principado de Asturias\"},{\"position\":{\"x\":62.24256292906178,\"y\":65.38757553677559},\"alwaysFullscreen\":false,\"content\":[{\"params\":{\"text\":\"<p>La Región de Murcia (CARM) integra herramientas de inteligencia artificial principalmente a través de Google Workspace. Los docentes disponen de acceso a Gemini y NotebookLM mediante sus cuentas corporativas, además del paquete de <a href=\\\"https://www.murciaeduca.es/cppabloneruda/sitio/upload/Office_365_para_maestros.pdf\\\" target=\\\"_blank\\\">Office 365</a> con sus cuentas<strong> @aulaxxi.murciaeduca.es</strong>.</p>\\n\\n<p>Es importante destacar que estas aplicaciones de IA están restringidas para el alumnado, quienes cuentan con el paquete de Google pero sin acceso a Gemini ni NotebookLM. Por otro lado, la región ofrece herramientas específicas como Wiris Quizzes (con MathType) para sus plataformas Moodle y licencias de Microsoft 365 limitadas a familias profesionales de FP.</p>\\n\"},\"library\":\"H5P.Text 1.1\",\"metadata\":{\"contentType\":\"Texto\",\"license\":\"U\",\"title\":\"Sin título Texto\",\"authors\":[],\"changes\":[]},\"subContentId\":\"8d59d4c8-a018-401c-be37-9428e92bf958\"}],\"header\":\"Región de Murcia\"},{\"position\":{\"x\":41.18993135011442,\"y\":94.76154666932382},\"alwaysFullscreen\":false,\"content\":[{\"params\":{\"text\":\"<p>En el Territorio MEC (Ceuta, Melilla y centros en el exterior), los docentes pueden utilizar la herramienta específica <a href=\\\"http://epale.ec.europa.eu/es/content/el-mefpd-impulsa-un-piloto-de-innovacion-educativa-con-ia-en-ceuta-y-melilla\\\" target=\\\"_blank\\\">AInara</a> y los servicios de Microsoft Copilot con su cuenta corporativa (como @educacion.gob.es, @educeuta.es o @docentemelilla.educacion.gob.es), centralizándose todas las directrices, guías éticas y recursos de formación en el <a href=\\\"https://code.intef.es/observatorio-ia/\\\" rel=\\\"noopener\\\" target=\\\"_blank\\\">Observatorio de la IA</a> del INTEF.</p>\\n\"},\"library\":\"H5P.Text 1.1\",\"metadata\":{\"contentType\":\"Texto\",\"license\":\"U\",\"title\":\"Sin título Texto\",\"authors\":[],\"changes\":[]},\"subContentId\":\"ddfb3318-eac2-4d09-9177-3a1bef933c44\"}],\"header\":\"Territorio MEC\"}],\"hotspotNumberLabel\":\"Punto clave #num\",\"closeButtonLabel\":\"Cerrar\",\"containsAudioVideoLabel\":\"Contains Audio/Video\"
